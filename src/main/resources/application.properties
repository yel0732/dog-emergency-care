spring.application.name=rescue-mungz
spring.config.import=optional:file:.env[.properties]
auth.jwt.secret=${JWT_SECRET}
auth.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:7200}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=true

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=null

springdoc.swagger-ui.path=/swagger-ui.html

kakao.rest-api-key=${KAKAO_REST_API_KEY:}
google.places-api-key=${GOOGLE_PLACES_API_KEY:}

gms.api-key=${GMS_API_KEY:}
gms.base-url=${GMS_BASE_URL:https://gms.ssafy.io/gmsapi}
gms.chat-completions-path=${GMS_CHAT_COMPLETIONS_PATH:/api.openai.com/v1/chat/completions}
gms.model=${GMS_MODEL:gpt-4o-mini}
gms.timeout-seconds=${GMS_TIMEOUT_SECONDS:8}

spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:openai}
spring.ai.openai.api-key=${GMS_API_KEY:disabled-local-gms-key}
spring.ai.openai.base-url=${GMS_BASE_URL:https://gms.ssafy.io/gmsapi}
spring.ai.openai.chat.completions-path=${GMS_CHAT_COMPLETIONS_PATH:/api.openai.com/v1/chat/completions}
spring.ai.openai.chat.options.model=${GMS_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=${GMS_TEMPERATURE:0.2}
spring.ai.retry.max-attempts=${GMS_RETRY_MAX_ATTEMPTS:1}
